# 针对 京东云 AX6000 (百里) 的编译配置
name: Build Padavan

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  watch:
    types: [started]

env:
  TNAME: JDC_AX6000  # 百里对应的机型标识
  CONFIG_FILE: .config
  DIY_SH: diy.sh
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-20.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: Initialization environment
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf g++-multilib gawk qemu-utils xxd libncurses5-dev

    - name: Clone source code
      run: |
        git clone --depth=1 https://github.com/hanwckf/rt-n56u.git /opt/rt-n56u

    - name: Build firmware
      run: |
        cd /opt/rt-n56u/toolchain-mipsel
        sh clean_sources
        sh build_toolchain
        cd /opt/rt-n56u/trunk
        # 匹配百里的配置文件
        if [ -f configs/templates/$TNAME.config ]; then
          cp -f configs/templates/$TNAME.config .config
        else
          echo "找不到 $TNAME 配置，列出当前支持的配置："
          ls configs/templates/
          exit 1
        fi
        sh build_firmware
        mkdir -p /opt/images/
        mv /opt/rt-n56u/trunk/images/*.trx /opt/images/ 2>/dev/null || mv /opt/rt-n56u/trunk/images/*.bin /opt/images/

    - name: Upload firmware
      uses: actions/upload-artifact@master
      if: env.UPLOAD_FIRMWARE == 'true'
      with:
        name: Padavan_JDC_Baili
        path: /opt/images/

